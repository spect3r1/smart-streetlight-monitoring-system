name: streetlight_app
description: Street light monitoring dashboard for Flutter web and mobile.
publish_to: none

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  fl_chart: ^0.69.0
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
